name: rentnear
description: "RentNear — Hyperlocal P2P Rental Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.4


  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^7.1.0
  uuid: ^4.5.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  timeago: ^3.7.0
  google_sign_in: ^7.2.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.3
  mockito: ^5.4.6
  build_verify: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
